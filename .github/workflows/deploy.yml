# Deploy automático: a cada push na branch main, faz build e envia a pasta build/ por FTP.
# Configure os segredos no repositório: GitHub → Settings → Secrets and variables → Actions.

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Permite rodar manualmente em Actions → Deploy → Run workflow

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
          DEPLOY_SKIP_BUILD: '1'
        run: node scripts/deploy.js
