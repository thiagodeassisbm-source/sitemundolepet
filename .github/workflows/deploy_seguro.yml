name: Deploy Seguro
on:
  push:
    branches:
      - main
jobs:
  web-deploy:
    name: Deploy para Produção
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_HOST || secrets.FTP_HOSTNAME }}
        username: ${{ secrets.FTP_USER || secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT || 21 }}
        local-dir: ./
        server-dir: ${{ secrets.FTP_REMOTE_PATH || '/' }}
        # Removido parâmetro incompatível
        # Ignora arquivos de sistema e de ambiente locais

        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          .env
          .env.production
          scripts/**
          storage/*.key
          vendor/**
